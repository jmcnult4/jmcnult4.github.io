<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Full Belly Advisors — Julie McNulty</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:        #F5F1E8;
      --cream-dark:   #EAE4D6;
      --sage:         #7A9E7E;
      --sage-mid:     #5C8060;
      --sage-dark:    #3D5C41;
      --sage-deep:    #2A3F2D;
      --gold:         #A8803C;
      --gold-light:   #C9A86C;
      --terra:        #7A5C3A;
      --ink:          #1E2B20;
      --mist:         #C8D5C9;
      --sage-pale:    #C2D4C4;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      line-height: 1.75;
      overflow-x: hidden;
    }

    /* ─── NAV ──────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 4rem;
      background: rgba(245, 241, 232, 0.0);
      backdrop-filter: blur(0px);
      border-bottom: 1px solid transparent;
      transition: background 0.5s, backdrop-filter 0.5s, border-color 0.5s;
    }

    nav.scrolled {
      background: rgba(245, 241, 232, 0.93);
      backdrop-filter: blur(14px);
      border-bottom-color: rgba(122, 158, 126, 0.18);
    }

    .nav-logo {
      font-family: 'Jost', sans-serif;
      font-weight: 400;
      font-size: 1.05rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--cream);
      transition: color 0.5s;
    }

    nav.scrolled .nav-logo { color: var(--sage-deep); }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(245, 241, 232, 0.8);
      transition: color 0.3s;
    }

    nav.scrolled .nav-links a { color: var(--sage-mid); }
    .nav-links a:hover { color: var(--gold-light) !important; }

    /* Mobile menu toggle */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }

    .nav-toggle span {
      display: block;
      width: 24px;
      height: 1.5px;
      background: var(--cream);
      transition: background 0.5s, transform 0.35s, opacity 0.35s;
    }

    nav.scrolled .nav-toggle span { background: var(--sage-deep); }

    .nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    /* ─── HERO ─────────────────────────────────────────────── */
    .hero {
      position: relative;
      height: 100vh;
      min-height: 600px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 42%;
      filter: sepia(15%) contrast(1.06) brightness(0.75) hue-rotate(5deg);
      transition: transform 10s ease;
    }

    .hero:hover img { transform: scale(1.04); }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        155deg,
        rgba(42, 63, 45, 0.82) 0%,
        rgba(61, 92, 65, 0.55) 45%,
        rgba(92, 128, 96, 0.25) 100%
      );
      z-index: 1;
    }

    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: linear-gradient(to bottom, transparent, rgba(42, 63, 45, 0.6));
      z-index: 1;
    }

    .hero-text {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 4rem;
      max-width: 820px;
      animation: fadeUp 1.3s ease both;
    }

    .hero-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--sage-pale);
      margin-bottom: 1.8rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }

    .hero-eyebrow::before,
    .hero-eyebrow::after {
      content: '';
      display: block;
      width: 36px;
      height: 1px;
      background: var(--sage-pale);
      opacity: 0.55;
    }

    .hero-headline {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 5.5vw, 6rem);
      line-height: 1.08;
      color: var(--cream);
      margin-bottom: 1.8rem;
    }

    .hero-headline em {
      font-style: italic;
      font-weight: 400;
      font-size: 1.3em;
      color: var(--gold-light);
    }

    .hero-sub {
      font-size: 1.05rem;
      font-weight: 300;
      color: rgba(245, 241, 232, 0.76);
      max-width: 520px;
      margin: 0 auto 3rem;
      line-height: 1.85;
    }

    .btn {
      display: inline-block;
      padding: 0.9rem 2.4rem;
      border: 1px solid rgba(200, 213, 201, 0.5);
      color: var(--cream);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      transition: background 0.35s, border-color 0.35s;
    }

    .btn:hover {
      background: var(--sage-mid);
      border-color: var(--sage-mid);
    }

    /* ─── TAGLINE BAND ─────────────────────────────────────── */
    .tagline-band {
      background: var(--sage-deep);
      padding: 2rem 6rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    .tagline-band::before {
      content: '—';
      color: var(--gold-light);
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .tagline-band p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.3rem, 2vw, 1.9rem);
      color: var(--cream);
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .tagline-band span {
      margin-left: auto;
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sage-pale);
      flex-shrink: 0;
    }

    /* ─── SECTION LABEL ─────────────────────────────────────── */
    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--sage-mid);
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 2rem;
    }

    .section-label::after {
      content: '';
      display: block;
      width: 40px;
      height: 1px;
      background: var(--sage-mid);
    }

    /* ─── STORY ─────────────────────────────────────────────── */
    .story {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 6rem;
      max-width: 1200px;
      margin: 0 auto;
      padding: 9rem 6rem 8rem;
      align-items: start;
    }

    .story-content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 3vw, 3.2rem);
      line-height: 1.2;
      color: var(--sage-deep);
      margin-bottom: 2.2rem;
    }

    .story-content p {
      font-size: 0.97rem;
      color: #4A4A40;
      margin-bottom: 1.3rem;
      line-height: 1.85;
    }

    .story-pull { padding-top: 3rem; }

    .pull-quote {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(1.6rem, 2.2vw, 2.2rem);
      line-height: 1.4;
      color: var(--sage-dark);
      border-left: 2px solid var(--sage);
      padding-left: 2rem;
      margin-bottom: 2rem;
    }

    .pull-attr {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sage-mid);
      padding-left: 2rem;
    }

    .philosophy-statement {
      margin-top: 3rem;
      padding-top: 2.5rem;
      border-top: 1px solid rgba(122, 158, 126, 0.25);
    }

    .philosophy-statement p {
      font-size: 0.97rem;
      color: #4A4A40;
      line-height: 1.85;
      margin-bottom: 1.2rem;
    }

    .philosophy-attr {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sage-mid);
    }

    /* ─── SERVICES ─────────────────────────────────────────── */
    .services-section { padding: 6rem 0 8rem; }

    .services-header {
      text-align: center;
      margin-bottom: 5rem;
      padding: 0 4rem;
    }

    .services-header .section-label { justify-content: center; }

    .services-header h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.5rem, 3.5vw, 4rem);
      color: var(--sage-deep);
      margin-top: 0.8rem;
    }

    .services-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .service-panel { padding: 5rem 5.5rem; }

    .service-panel:nth-child(1) { background: var(--sage-dark); }
    .service-panel:nth-child(2) { background: var(--cream-dark); }

    .service-panel h3 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      font-size: 2rem;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid;
    }

    .service-panel:nth-child(1) h3 { color: var(--sage-pale); border-color: rgba(200,213,201,0.25); }
    .service-panel:nth-child(2) h3 { color: var(--sage-deep); border-color: rgba(61,92,65,0.2); }

    .service-item { margin-bottom: 2.8rem; }

    .service-item h4 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: 1.15rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.6rem;
    }

    .service-panel:nth-child(1) .service-item h4 { color: var(--cream); }
    .service-panel:nth-child(2) .service-item h4 { color: var(--sage-deep); }

    .service-item p { font-size: 0.9rem; line-height: 1.8; }

    .service-panel:nth-child(1) .service-item p { color: rgba(245,241,232,0.68); }
    .service-panel:nth-child(2) .service-item p { color: #4A4A40; }

    /* ─── ABOUT ────────────────────────────────────────────── */
    .about {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      max-width: 1200px;
      margin: 0 auto;
      padding: 8rem 4rem 8rem 6rem;
    }

    .about-label { padding-top: 0.4rem; }

    .about-content h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 3vw, 3.2rem);
      line-height: 1.2;
      color: var(--sage-deep);
      margin-bottom: 2rem;
    }

    .about-content p {
      font-size: 0.97rem;
      color: #4A4A40;
      margin-bottom: 1.3rem;
      max-width: 580px;
    }

    /* ─── CONTACT ───────────────────────────────────────────── */
    .contact {
      background: var(--sage-dark);
      padding: 7rem 6rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: center;
    }

    .contact-left .section-label { color: var(--sage-pale); }
    .contact-left .section-label::after { background: var(--sage-pale); }

    .contact-left h2 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.2rem, 3vw, 3.5rem);
      color: var(--cream);
